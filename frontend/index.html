<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>HCAI Email Assistant</title>
		<link rel="stylesheet" href="./src/assets/style.css">
	</head>
	<body>
		<main class="container">
			<h1>Email Draft Prototype</h1>

			<section class="extra-box">
				<h2>Context Box</h2>
				<textarea id="contextInput" rows="4" placeholder="Add context, previous mails, tone hints..."></textarea>
			</section>

			<form id="textForm" class="layout">
				<section class="panel">
					<h2>User Email</h2>
					<textarea id="messageInput" name="message" rows="10" placeholder="Type here..."></textarea>
				</section>

				<div class="middle-actions">
					<button type="button" id="settingsBtn" title="Settings">
						<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
							<circle cx="12" cy="12" r="3"></circle>
							<path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
						</svg>
					</button>
					<button type="submit">Submit</button>
				</div>

				<section class="panel">
					<div class="panel-header">
						<h2>AI Suggestion</h2>
					</div>
					<div class="output-wrapper">
						<pre id="submittedOutput"></pre>
						<button type="button" id="copyBtn" disabled title="Copy to clipboard">
							<svg id="iconCopy" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
								<rect x="9" y="2" width="13" height="13" rx="2" ry="2"></rect>
								<path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
							</svg>
							<svg id="iconCheck" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
								<polyline points="20 6 9 17 4 12"></polyline>
							</svg>
						</button>
					</div>
					<p id="statusText" aria-live="polite"></p>
				</section>
			</form>

			<section class="extra-box">
				<h2>Reasoning</h2>
				<pre id="reasoningOutput"></pre>
			</section>
		</main>

		<!-- Settings modal -->
		<div id="settingsModal" class="modal-backdrop" hidden>
			<div class="modal">
				<div class="modal-header">
					<h2>Settings</h2>
					<button type="button" id="closeSettingsBtn" title="Close">
						<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
							<line x1="18" y1="6" x2="6" y2="18"></line>
							<line x1="6" y1="6" x2="18" y2="18"></line>
						</svg>
					</button>
				</div>
				<div class="modal-body">
					<div class="setting-row">
						<label for="settingTemperature">Temperature <span class="setting-hint">(0 – 2)</span></label>
						<input type="number" id="settingTemperature" min="0" max="2" step="0.1" value="1" placeholder="0 – 2">
					</div>
					<div class="setting-row">
						<label for="settingMaxTokens">Max output tokens</label>
						<input type="number" id="settingMaxTokens" min="1" max="4096" step="1" value="1024" placeholder="1 – 4096">
					</div>
					<div class="setting-row">
						<label for="settingModel">Model</label>
						<select id="settingModel">
							<option value="gpt-4o-mini" selected>gpt-4o-mini</option>
							<option value="gpt-4o">gpt-4o</option>
							<option value="gpt-4-turbo">gpt-4-turbo</option>
							<option value="gpt-3.5-turbo">gpt-3.5-turbo</option>
						</select>
					</div>
				</div>
				<div class="modal-footer">
					<button type="button" id="saveSettingsBtn">Save</button>
				</div>
			</div>
		</div>

		<script src="./src/scripts/code.js"></script>
	</body>
</html>
